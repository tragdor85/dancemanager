<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dance Manager{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: #333; color: white; width: 100%; display: flex; flex-direction: column; align-items: flex-start; padding: 15px 20px; border-radius: 4px; }
        .header img { max-height: 80px; width: auto; margin-bottom: 10px; }
        .header nav { background: transparent; padding: 0; margin: 0; display: flex; gap: 20px; }
        .header a { color: white; text-decoration: none; }
        .header a:hover { text-decoration: underline; }
        h1 { color: #333; margin-bottom: 20px; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="/static/images/gta-logo.png" alt="GTA Dance Manager Logo">
            <nav>
                <a href="/">Home</a>
                <a href="/dancers">Dancers</a>
                <a href="/teams">Teams</a>
                <a href="/classes">Classes</a>
                <a href="/instructors">Instructors</a>
                <a href="/dances">Dances</a>
                <a href="/recitals">Recitals</a>
            </nav>
        </div>
        {% block content %}{% endblock %}
    </div>
    {% block extra_js %}{% endblock %}
</body>
</html>
